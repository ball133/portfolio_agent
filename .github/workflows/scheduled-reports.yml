name: Scheduled Portfolio Reports
on:
  schedule:
    - cron: "30 13 * * 1-5"  # 13:30 UTC = 21:30 HKT (US market open, Mon-Fri)
    - cron: "0 23 * * 0-6"  # 23:00 UTC = 07:00 HKT next day (daily)
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run scheduler (force single run)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/scheduler.py --run-now
